name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*' # Sproži se le, ko potisnete oznako, ki se začne z 'v' (npr. v0.0.1)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Uporabi ime taga (npr. v0.0.1), ki ste ga pravkar potisnili
          tags:
            blaze666/solski-urnik:${{ github.ref_name }}
            
      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags:
            blaze666/solski-urnik-api:${{ github.ref_name }}
            
