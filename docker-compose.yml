services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: solski-urnik-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: solski_urnik
      POSTGRES_USER: solski_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SolskiUrnik2025!}
#    ports:
#      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solski_admin -d solski_urnik"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      test:
        ipv4_address: 172.23.0.61

  # Alternative: MariaDB (uncomment to use instead of PostgreSQL)
  # db:
  #   image: mariadb:11
  #   container_name: solski_urnik_db
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
  #     MYSQL_DATABASE: solski_urnik
  #     MYSQL_USER: solski_admin
  #     MYSQL_PASSWORD: ${DB_PASSWORD:-SolskiUrnik2025!}
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mariadb_data:/var/lib/mysql
  #     - ./docker/init-mariadb.sql:/docker-entrypoint-initdb.d/init.sql
  #   healthcheck:
  #     test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Frontend (Nginx serving static build)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solski-urnik
    restart: unless-stopped
    ports:
      - "8800:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      test:
        ipv4_address: 172.23.0.60
      traefik:
        ipv4_address: 172.18.0.98
    labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik"
        - "traefik.http.routers.urnik.rule=Host(`urnik.tekavec.net`)" # || Host(`dba.tekavec.org`) || Host(`dba.moj-svet.si`)"
        - "traefik.http.services.urnik.loadbalancer.server.port=80"
#        - "traefik.http.routers.urnik.tls.domains[0].main=urnik.tekavec.net"
#        - "traefik.http.routers.dba.tls.domains[1].main=dba.tekavec.org"
#        - "traefik.http.routers.dba.tls.domains[2].main=dba.moj-svet.si"
        - "traefik.http.routers.urnik.service=urnik"
        - "traefik.http.routers.urnik.entrypoints=websecure"
        - "traefik.http.routers.urnik.tls=true"
        - "traefik.http.routers.urnik.tls.certresolver=le-test"
#        - "traefik.http.routers.dba.middlewares=dba-auth"
#        - "traefik.http.middlewares.dba-auth.basicauth.users=blaze666:{SHA}OZEO/t+ggBAOzLTh5+ULYTxoaHY="
        - "traefik.http.routers.urnik.middlewares=geoblock@file,tinyauth@file" #,secure-headers@file,ratelimit@file"

        - "traefik.http.routers.urnik-ui-redirect.rule=Host(`urnik.tekavec.net`)" # || Host(`dba.tekavec.org`)  || Host(`dba.moj-svet.si`)"
        ## Define entrypoint which uses no tls/ssl cert
        - "traefik.http.routers.urnik-ui-redirect.entrypoints=web"
        ## Define middleware
        - "traefik.http.middlewares.redirect-to-websecure.redirectscheme.scheme=https"
        ## Assign middleware to router
        - "traefik.http.routers.urnik-ui-redirect.middlewares=redirect-to-websecure"
        ## Define service: route to port 80 internal
        - "traefik.http.services.urnik-ui-redirect.loadbalancer.server.port=80"
        ## Assign service to router
        - "traefik.http.routers.urnik-ui-redirect.service=urnik-ui-redirect"
#        - "com.centurylinklabs.watchtower.enable=true"

  # Backend API (Express.js)
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: solski-urnik-api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: solski_urnik
      DB_USER: solski_admin
      DB_PASSWORD: ${DB_PASSWORD:-SolskiUrnik2025!}
      JWT_SECRET: ${JWT_SECRET:-solski-urnik-jwt-secret-change-me}
      PORT: "3001"
#    ports:
#      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
#    healthcheck:
#      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
#      interval: 10s
#      timeout: 5s
#      retries: 5
    networks:
      test:
        ipv4_address: 172.23.0.62

  # Adminer - Database management UI (optional, for development)
#  adminer:
#    image: adminer:latest
#    container_name: solski_urnik_adminer
#    restart: unless-stopped
#    ports:
#      - "8081:8080"
#    depends_on:
#      - db

#volumes:
#  postgres_data:
#    driver: local
  # mariadb_data:
  #   driver: local

networks:
  test:
    external: true
  traefik:
    external: true